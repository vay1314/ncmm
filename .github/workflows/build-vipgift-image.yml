name: Build vipGift Image

on:
  # push:
  #   tags:
  #     - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如：1.1.7，输入 auto 则读取 VERSION 文件）'
        required: false
        type: string
        default: 'auto'
      commit_sha:
        description: '构建的 Git Commit Hash 或分支/标签（例如：2fb17f01bc，默认为 HEAD）'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  docker-cloud:
    name: Build & Push Cloud Server Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || github.sha }}
          fetch-depth: 0

      - name: Resolve Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
          else
            if echo "${{ github.ref }}" | grep -q "^refs/tags/"; then
              INPUT_VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\///')
            else
              INPUT_VERSION="auto"
            fi
          fi

          if [ "$INPUT_VERSION" = "auto" ] || [ -z "$INPUT_VERSION" ]; then
            CURRENT_COMMIT_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
            if [ -n "$CURRENT_COMMIT_TAG" ]; then
              VERSION=$(echo "$CURRENT_COMMIT_TAG" | sed 's/^v//' | tr -d '[:space:]')
            elif [ -f VERSION ]; then
              VERSION=$(cat VERSION | tr -d '[:space:]')
            else
              VERSION="1.1.7"
            fi
          else
            VERSION=$(echo "$INPUT_VERSION" | sed 's/^v//' | tr -d '[:space:]')
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-vip-member-gift-cloud
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./tools/vip_member_gift_cloud
          file: ./tools/vip_member_gift_cloud/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
