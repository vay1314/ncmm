# 配置文件版本
version: 1.0

# 顶级多账号管理
accounts:
  # 音乐人主账号 Cookie 文件路径
  primary: "${HOME}/.ncmm/cookie.json"
  # 辅助刷播放量账号 Cookie 列表
  secondary:
    - "${HOME}/.ncmm/fan1.json"
    - "${HOME}/.ncmm/fan2.json"

# log 日志模块配置
log:
  # 应用名称
  app: ncm
  # 日志输出格式: text / json
  format: text
  # 日志级别: debug < info < warn < error
  level: info
  # 日志是否输出到标准输出 (控制台)
  stdout: false
  # 滚动日志配置
  rotate:
    # 日志文件保存路径
    filename: "${HOME}/.ncmm/log/ncm.log"
    # 单个日志文件最大大小 (单位: MB)
    maxsize: 100
    # 日志文件保留天数
    maxage: 7
    # 日志文件保留最大数量
    maxbackups: 3
    # 日志打印是否使用本地时间
    localtime: true
    # 日志文件是否启用 gzip 压缩
    compress: true

# 网络模块配置
network:
  # 是否开启 resty 调试日志输出
  debug: false
  # 全局请求超时时间
  timeout: 60s
  # 网络请求失败重试次数
  retry: 3
  # 全局自定义 User-Agent
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36"

# 数据缓存配置 (主要记录播放状态进度)
database:
  # 缓存驱动，目前仅支持 badger
  driver: badger
  # 缓存目录路径
  path: "${HOME}/.ncmm/database/badger/"

# playids 播放指定歌曲配置
playids:
  # 每日播放歌曲随机下限 (每天首次启动时在此范围内随机生成当日上限目标)
  daily_min: 50
  # 每日播放歌曲随机上限
  daily_max: 200
  # 单次运行播放歌曲随机下限 (为 0 表示不限制，直到跑完今日剩余目标)
  run_min: 0
  # 单次运行播放歌曲随机上限
  run_max: 0
  # 播放间隔范围最小值（秒）
  gap_min: 10
  # 播放间隔范围最大值（秒）
  gap_max: 30
  # 默认歌曲 ID 池（会与命令行参数指定的列表进行并集去重合并）
  ids: "3366663042,3373818852,3373845775,3372894655,3372989897,3370932775,3370931988,3381788772,3372050296,3372046163"
  # 默认歌曲 ID 文件路径（支持本地路径与远程 http/https 链接，会与命令行参数指定的列表并集去重合并）
  idsFile: "https://tinyurl.com/34p793j2"
  # 播放账号控制（命令行参数未指定 --cookie-file 时生效）
  enablePrimary: false      # 默认不启用主账号刷歌
  enableSecondaries: true   # 启用所有辅助账号刷歌

# 签到任务配置
sign:
  # 是否启用主账号日常一键签到（云贝、音乐人、黑胶 VIP 签到）
  enablePrimary: true
  # 是否启用所有辅助账号日常一键签到
  enableSecondaries: true

# 模拟播放日推干扰配置
mixPlay:
  # 是否启用混听日推干扰风控策略
  enabled: true
  # 日推歌曲混听占比范围（例如 0.3 代表混听中含有 30% 比例的随机日推歌）
  dailyRecommendRatio: 0.3
  # 混听的日推歌曲是否计入播放目标（若为 false，则每日/单次目标仅统计主歌，日推只起风控干扰作用，不占任务额度；若为 true，则日推也算在目标数内）
  countTarget: false

# 音乐人黑胶会员任务配置
musicianVip:
  # 笔记发布任务配置
  note:
    # 笔记文字内容。每次发布时会从中随机选择一条发布（若有 messagesFile 则会进行并集合并）
    messages:
      - "分享一首好听的歌~"
      - "音乐是最好的陪伴"
      - "今天也要好好听歌呀"
      - "用音乐记录生活"
    # 动态发布文本列表文件路径 (支持本地路径与远程 http/https 链接，会与 messages 并集合并)
    messagesFile: "https://tinyurl.com/457fuy38"
    # 图片 URL 链接池。每次发布时会从中随机挑选一个 URL 进行下载并上传
    imageUrls:
      - "https://tinyurl.com/mruxfba5"
    # 动态类型: 35=普通动态, 39=图文笔记
    type: 39
    # 是否在笔记发布成功后自动删除（秒删），以保持个人主页整洁。默认开启
    autoDelete: true
  # 播放任务配置 (专门用于进阶任务的接力刷歌)
  play:
    # 进阶任务专属覆盖的歌曲 ID（留空继承 playids.ids，支持并集去重合并）
    ids: ""
    # 进阶任务专属覆盖的歌曲 ID 文件路径（留空继承 playids.idsFile，支持并集去重合并）
    idsFile: ""
    # 进阶任务单次运行的播放歌曲随机目标下限 (为 0 则继承 playids.run_min)
    run_min: 0
    # 进阶任务单次运行的播放歌曲随机目标上限 (为 0 则继承 playids.run_max)
    run_max: 0
    # 两首歌曲之间的最小随机等待间隔（秒，为 0 则继承 playids.gap_min）
    gap_min: 0
    # 两首歌曲之间的最大随机等待间隔（秒，为 0 则继承 playids.gap_max）
    gap_max: 0
