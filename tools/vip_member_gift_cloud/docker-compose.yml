services:
  ncmm-vip-member-gift-cloud:
    image: ncmm-vip-member-gift-cloud
    container_name: ncmm-vip-member-gift-cloud
    ports:
      - "3102:3102"
    volumes:
      - "./vip-gift-data:/data"
      - "./vip_member_gift_cloud.py:/app/vip_member_gift_cloud.py"
      # 挂载宿主机时区文件以同步时区（可选）
      - "/etc/localtime:/etc/localtime:ro"
      - "/etc/timezone:/etc/timezone:ro"
    environment:
      VIP_GIFT_CLOUD_TOKEN: xxxxxxxxx
      # 设置容器内的时区环境变量
      TZ: Asia/Shanghai
